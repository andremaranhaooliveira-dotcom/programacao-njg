<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TMS NJG 3.0</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f4f8;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:20px;
}

header img{
height:60px;
}

.container{
padding:20px;
}

.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
flex:1;
box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.card h3{
margin:0;
font-size:14px;
color:#555;
}

.card p{
font-size:24px;
margin:5px 0 0 0;
font-weight:bold;
}

.form{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.form input{
padding:6px;
margin:4px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:7px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{
background:#28a745;
color:white;
}

.del{
background:#dc3545;
color:white;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#1c3d6b;
color:white;
padding:8px;
font-size:13px;
}

td{
padding:6px;
border:1px solid #ddd;
font-size:13px;
}

</style>
</head>

<body>

<header>

<img src="logo.png">

<h2>TMS NJG 3.0 • Gestão de Transportes</h2>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Cargas</h3>
<p id="totalCargas">0</p>
</div>

<div class="card">
<h3>Checklist OK</h3>
<p id="checkOK">0</p>
</div>

<div class="card">
<h3>Pendentes</h3>
<p id="pendentes">0</p>
</div>

</div>

<div class="form">

<h3>Novo Carregamento</h3>

<input id="data" type="date">

<input id="transportadora" placeholder="Transportadora">

<input id="rota" placeholder="Origem/Destino">

<input id="cavalo" placeholder="Cavalo">

<input id="carreta" placeholder="Carreta">

<input id="motorista" placeholder="Motorista">

<input id="frete" placeholder="Frete">

<input id="status" placeholder="Status">

<button class="add" onclick="salvar()">Adicionar</button>

</div>

Buscar

<input id="busca" onkeyup="render()" placeholder="motorista / placa / transportadora">

<table>

<thead>

<tr>
<th>Data</th>
<th>Transportadora</th>
<th>Rota</th>
<th>Cavalo</th>
<th>Carreta</th>
<th>Motorista</th>
<th>Frete</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const KEY="tms_njg"

let dados=[]

function carregar(){

const s=localStorage.getItem(KEY)

if(s) dados=JSON.parse(s)

}

function salvarStorage(){

localStorage.setItem(KEY,JSON.stringify(dados))

}

function salvar(){

const r={

id:Date.now(),

data:data.value,
transportadora:transportadora.value,
rota:rota.value,
cavalo:cavalo.value,
carreta:carreta.value,
motorista:motorista.value,
frete:frete.value,
status:status.value

}

dados.push(r)

salvarStorage()

render()

}

function excluir(id){

if(!confirm("Excluir registro?")) return

dados=dados.filter(x=>x.id!==id)

salvarStorage()

render()

}

function render(){

const tb=document.getElementById("tabela")

tb.innerHTML=""

let lista=[...dados]

const busca=document.getElementById("busca").value.toLowerCase()

if(busca){

lista=lista.filter(r=>

(r.motorista||"").toLowerCase().includes(busca) ||
(r.transportadora||"").toLowerCase().includes(busca) ||
(r.cavalo||"").toLowerCase().includes(busca)

)

}

let ok=0

lista.forEach(r=>{

if(r.status=="OK") ok++

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.data}</td>
<td>${r.transportadora}</td>
<td>${r.rota}</td>
<td>${r.cavalo}</td>
<td>${r.carreta}</td>
<td>${r.motorista}</td>
<td>${r.frete}</td>
<td>${r.status}</td>

<td>

<button class="del" onclick="excluir(${r.id})">Excluir</button>

</td>

`

tb.appendChild(tr)

})

document.getElementById("totalCargas").innerText=dados.length

document.getElementById("checkOK").innerText=ok

document.getElementById("pendentes").innerText=dados.length-ok

}

carregar()

render()

</script>

</body>
</html>
