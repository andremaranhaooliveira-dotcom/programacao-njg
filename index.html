<style>

body{

</head>

<body>

<header class="topbar">

<div class="logo">
<img src="logo.png">
TMS NJG 12.0
</div>

</header>

<div class="dashboard">

<div class="card">
<h2 id="total">0</h2>
Total Registros
</div>

<div class="card">
<h2 id="freteTotal">0</h2>
Total Frete
</div>

</div>

<div class="form">

<input id="viagem" placeholder="Viagem">
<input id="data" placeholder="Data">
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="transportadora" placeholder="Transportadora">
<input id="motorista" placeholder="Motorista">
<input id="veiculo" placeholder="Veículo">
<input id="placa" placeholder="Placa">
<input id="peso" placeholder="Peso">
<input id="volumes" placeholder="Volumes">
<input id="frete" placeholder="Frete CTE">
<input id="freteMotorista" placeholder="Frete Motorista">
<input id="pedagio" placeholder="Pedágio">
<input id="status" placeholder="Status">

<button class="btnSalvar" onclick="salvar()">Salvar</button>

</div>

<div class="tableArea">

<input id="busca" placeholder="Buscar..." onkeyup="filtrar()">

<table>

<thead>

<tr>

<th>Viagem</th>
<th>Data</th>
<th>Origem</th>
<th>Destino</th>
<th>Transportadora</th>
<th>Motorista</th>
<th>Veículo</th>
<th>Placa</th>
<th>Peso</th>
<th>Volumes</th>
<th>Frete</th>
<th>Frete Motorista</th>
<th>Pedágio</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAd4yEQwsQ2ps8oRv4Ng97F1xu1Sc-mnC8",
authDomain: "njg-controle-de-carregamento.firebaseapp.com",
projectId: "njg-controle-de-carregamento",
storageBucket: "njg-controle-de-carregamento.firebasestorage.app",
messagingSenderId: "753611983634",
appId: "1:753611983634:web:71b5793a63599a2b7e01cb",
measurementId: "G-JWDW47YE74"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId=null;

const tabela=document.getElementById("tabela");

async function carregar(){

const snapshot=await getDocs(collection(db,"cargas"));

tabela.innerHTML="";

let total=0;
let freteTotal=0;

snapshot.forEach((docu)=>{

const r=docu.data();

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${r.viagem||""}</td>
<td>${r.data||""}</td>
<td>${r.origem||""}</td>
<td>${r.destino||""}</td>
<td>${r.transportadora||""}</td>
<td>${r.motorista||""}</td>
<td>${r.veiculo||""}</td>
<td>${r.placa||""}</td>
<td>${r.peso||""}</td>
<td>${r.volumes||""}</td>
<td>${r.frete||""}</td>
<td>${r.freteMotorista||""}</td>
<td>${r.pedagio||""}</td>
<td>${r.status||""}</td>

<td>

<button class="btnEditar" onclick="editar('${docu.id}')">Editar</button>

<button class="btnExcluir" onclick="excluir('${docu.id}')">Excluir</button>

</td>

`;

tabela.appendChild(tr);

total++;

freteTotal+=Number(r.frete||0);

});

document.getElementById("total").innerText=total;
document.getElementById("freteTotal").innerText=freteTotal;

}

window.salvar=async function(){

const data={

viagem:viagem.value,
data:data.value,
origem:origem.value,
destino:destino.value,
transportadora:transportadora.value,
motorista:motorista.value,
veiculo:veiculo.value,
placa:placa.value,
peso:peso.value,
volumes:volumes.value,
frete:frete.value,
freteMotorista:freteMotorista.value,
pedagio:pedagio.value,
status:status.value

};

if(editId){

await updateDoc(doc(db,"cargas",editId),data);

editId=null;

}else{

await addDoc(collection(db,"cargas"),data);

}

document.querySelectorAll(".form input").forEach(i=>i.value="");

carregar();

}

window.excluir=async function(id){

if(!confirm("Excluir registro?"))return;

await deleteDoc(doc(db,"cargas",id));

carregar();

}

window.filtrar=function(){

const termo=document.getElementById("busca").value.toLowerCase();

document.querySelectorAll("#tabela tr").forEach(l=>{

l.style.display=l.innerText.toLowerCase().includes(termo)?"":"none";

});

}

carregar();

</script>

</body>
</html>
