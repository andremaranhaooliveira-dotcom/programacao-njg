<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>TMS NJG 5.0</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#111;
color:white;
display:flex;
align-items:center;
padding:15px;
gap:20px;
}

header img{
height:60px;
}

header h1{
font-size:22px;
}

.container{
padding:20px;
}

.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
flex:1;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.card h3{
margin:0;
font-size:14px;
color:#555;
}

.card p{
font-size:26px;
margin-top:5px;
font-weight:bold;
}

.form{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.form input{
padding:6px;
margin:4px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:7px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btnAdd{background:#28a745;color:white}
.btnEdit{background:#007bff;color:white}
.btnDel{background:#dc3545;color:white}
.btnExport{background:#333;color:white}

.toolbar{
margin-bottom:10px;
}

.toolbar input{
padding:6px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#1c3d6b;
color:white;
padding:8px;
font-size:13px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:13px;
text-align:center;
}

</style>
</head>

<body>

<header>

<img src="logo.png">

<h1>TMS NJG 5.0 • Gestão de Transportes</h1>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Cargas</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Frete Total</h3>
<p id="freteTotal">0</p>
</div>

<div class="card">
<h3>Checklist OK</h3>
<p id="ok">0</p>
</div>

<div class="card">
<h3>Pendentes</h3>
<p id="pend">0</p>
</div>

</div>

<div class="form">

<h3>Novo Carregamento</h3>

<input id="data" type="date">
<input id="transportadora" placeholder="Transportadora">
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="cavalo" placeholder="Cavalo">
<input id="carreta" placeholder="Carreta">
<input id="motorista" placeholder="Motorista">
<input id="frete" placeholder="Frete">
<input id="peso" placeholder="Peso">
<input id="status" placeholder="Status">

<button class="btnAdd" onclick="salvar()">Salvar</button>

</div>

<div class="toolbar">

<input id="busca" placeholder="Buscar..." onkeyup="render()">

<button class="btnExport" onclick="exportar()">Exportar Excel</button>

</div>

<table>

<thead>

<tr>
<th>Data</th>
<th>Transportadora</th>
<th>Origem</th>
<th>Destino</th>
<th>Cavalo</th>
<th>Carreta</th>
<th>Motorista</th>
<th>Frete</th>
<th>Peso</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const KEY="TMS_NJG"

let dados=[]

function carregar(){

const s=localStorage.getItem(KEY)

if(s) dados=JSON.parse(s)

}

function salvarStorage(){

localStorage.setItem(KEY,JSON.stringify(dados))

}

function salvar(){

const r={

id:Date.now(),

data:data.value,
transportadora:transportadora.value,
origem:origem.value,
destino:destino.value,
cavalo:cavalo.value,
carreta:carreta.value,
motorista:motorista.value,
frete:Number(frete.value),
peso:peso.value,
status:status.value

}

dados.push(r)

salvarStorage()

render()

}

function excluir(id){

if(!confirm("Excluir registro?")) return

dados=dados.filter(x=>x.id!==id)

salvarStorage()

render()

}

function render(){

const busca=document.getElementById("busca").value.toLowerCase()

let lista=[...dados]

if(busca){

lista=lista.filter(r=>

(r.motorista||"").toLowerCase().includes(busca) ||
(r.transportadora||"").toLowerCase().includes(busca) ||
(r.cavalo||"").toLowerCase().includes(busca)

)

}

const tb=document.getElementById("tabela")

tb.innerHTML=""

let totalFrete=0
let ok=0

lista.forEach(r=>{

totalFrete+=r.frete||0

if(r.status=="OK") ok++

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.data}</td>
<td>${r.transportadora}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>${r.cavalo}</td>
<td>${r.carreta}</td>
<td>${r.motorista}</td>
<td>${r.frete}</td>
<td>${r.peso}</td>
<td>${r.status}</td>

<td>
<button class="btnDel" onclick="excluir(${r.id})">Excluir</button>
</td>

`

tb.appendChild(tr)

})

document.getElementById("total").innerText=dados.length
document.getElementById("freteTotal").innerText=totalFrete
document.getElementById("ok").innerText=ok
document.getElementById("pend").innerText=dados.length-ok

}

function exportar(){

let csv="Data,Transportadora,Origem,Destino,Cavalo,Carreta,Motorista,Frete,Peso,Status\n"

dados.forEach(r=>{

csv+=`${r.data},${r.transportadora},${r.origem},${r.destino},${r.cavalo},${r.carreta},${r.motorista},${r.frete},${r.peso},${r.status}\n`

})

const blob=new Blob([csv],{type:"text/csv"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="carregamentos_njg.csv"

a.click()

}

carregar()

render()

</script>

</body>
</html>
