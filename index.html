```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TMS NJG Online</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

.topbar{
background:#2f4466;
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:600;
}

.logo img{
height:40px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btnNovo{background:#2ecc71;color:white}

.cards{
display:flex;
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
flex:1;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.tableArea{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#f4f6f9;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
<img src="logo.png">
TMS NJG
</div>

<button class="btnNovo" onclick="novo()">Novo Lançamento</button>

</div>

<div class="cards">

<div class="card">
<h2 id="total">0</h2>
Total Registros
</div>

</div>

<div class="tableArea">

<table>

<thead>

<tr>
<th>DATA</th>
<th>TRANSPORTADORA</th>
<th>ROTA</th>
<th>MOTORISTA</th>
<th>STATUS</th>
<th>AÇÕES</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "COLE_AQUI",
authDomain: "COLE_AQUI",
projectId: "COLE_AQUI",
storageBucket: "COLE_AQUI",
messagingSenderId: "COLE_AQUI",
appId: "COLE_AQUI"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function carregar(){

const querySnapshot = await getDocs(collection(db,"cargas"))

const tabela=document.getElementById("tabela")

tabela.innerHTML=""

let total=0

querySnapshot.forEach((docu)=>{

const r=docu.data()

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.data}</td>
<td>${r.transportadora}</td>
<td>${r.rota}</td>
<td>${r.motorista}</td>
<td>${r.status}</td>
<td>
<button onclick="excluir('${docu.id}')">Excluir</button>
</td>

`

tabela.appendChild(tr)

total++

})

document.getElementById("total").innerText=total

}

window.novo=async function(){

const data=prompt("Data")
const transportadora=prompt("Transportadora")
const rota=prompt("Rota")
const motorista=prompt("Motorista")
const status=prompt("Status")

await addDoc(collection(db,"cargas"),{

data,
transportadora,
rota,
motorista,
status

})

carregar()

}

window.excluir=async function(id){

await deleteDoc(doc(db,"cargas",id))

carregar()

}

carregar()

</script>

</body>
</html>
