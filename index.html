<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Programação de Cargas NJG</title>

<style>

body{
font-family:Arial;
background:#eef1f5;
margin:30px;
}

h1{
margin-bottom:20px;
}

.box{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

input,select{
padding:8px;
margin:3px;
}

button{
padding:7px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{background:#28a745;color:white;}
.del{background:#dc3545;color:white;}
.edit{background:#ffc107;}
.export{background:#007bff;color:white;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#f2f2f2;
}

.on{background:#d4edda;}
.off{background:#d1ecf1;}
.frog{background:#e2d9f3;}

.stats{
font-weight:bold;
margin:10px 0;
}

</style>

</head>

<body>

<h1>Programação de Cargas NJG</h1>

<div class="box">

<input id="data" type="date">

<select id="secao">
<option value="">Seção</option>
<option value="ON">ON</option>
<option value="OFF">OFF</option>
<option value="FROG">FROG</option>
</select>

<input id="transportadora" placeholder="Transportadora">

<input id="rota" placeholder="Origem / Destino">

<input id="motorista" placeholder="Motorista">

<button class="add" onclick="salvarRegistro()">Adicionar</button>

<button class="export" onclick="exportar()">Exportar Excel</button>

</div>

<div class="box">

Buscar:

<input id="busca" onkeyup="render()" placeholder="motorista / transportadora">

Filtro Data:

<input id="filtroData" type="date" onchange="render()">

</div>

<div class="stats" id="stats"></div>

<table>

<thead>

<tr>
<th>Data</th>
<th>Seção</th>
<th>Transportadora</th>
<th>Rota</th>
<th>Motorista</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<script>

const LS_KEY="njg_cargas_v1"

let dados=[]
let editando=null

function carregar(){

const s=localStorage.getItem(LS_KEY)

if(s){

dados=JSON.parse(s)

}

}

function salvar(){

localStorage.setItem(LS_KEY,JSON.stringify(dados))

}

function limpar(){

data.value=""
secao.value=""
transportadora.value=""
rota.value=""
motorista.value=""

}

function salvarRegistro(){

const registro={

id:editando ? editando : Date.now(),

data:data.value,
secao:secao.value,
transportadora:transportadora.value,
rota:rota.value,
motorista:motorista.value

}

if(editando){

dados=dados.map(r=>r.id===editando ? registro : r)
editando=null

}else{

dados.push(registro)

}

salvar()

limpar()

render()

}

function editar(id){

const r=dados.find(x=>x.id===id)

data.value=r.data
secao.value=r.secao
transportadora.value=r.transportadora
rota.value=r.rota
motorista.value=r.motorista

editando=id

}

function excluir(id){

if(!confirm("Deseja excluir este registro?")) return

dados=dados.filter(r=>r.id!==id)

salvar()

render()

}

function render(){

const tbody=document.getElementById("tbody")

tbody.innerHTML=""

let lista=[...dados]

const filtro=document.getElementById("filtroData").value

if(filtro){

lista=lista.filter(r=>r.data===filtro)

}

const busca=document.getElementById("busca").value.toLowerCase()

if(busca){

lista=lista.filter(r=>

r.motorista.toLowerCase().includes(busca) ||

r.transportadora.toLowerCase().includes(busca)

)

}

let totalON=0
let totalOFF=0
let totalFROG=0

lista.forEach(r=>{

if(r.secao==="ON") totalON++
if(r.secao==="OFF") totalOFF++
if(r.secao==="FROG") totalFROG++

const tr=document.createElement("tr")

let classe=""

if(r.secao==="ON") classe="on"
if(r.secao==="OFF") classe="off"
if(r.secao==="FROG") classe="frog"

tr.className=classe

tr.innerHTML=`

<td>${r.data}</td>
<td>${r.secao}</td>
<td>${r.transportadora}</td>
<td>${r.rota}</td>
<td>${r.motorista}</td>

<td>

<button class="edit" onclick="editar(${r.id})">Editar</button>

<button class="del" onclick="excluir(${r.id})">Excluir</button>

</td>

`

tbody.appendChild(tr)

})

document.getElementById("stats").innerText=

`TOTAL: ${lista.length} | ON: ${totalON} | OFF: ${totalOFF} | FROG: ${totalFROG}`

}

function exportar(){

let csv="Data,Secao,Transportadora,Rota,Motorista\n"

dados.forEach(r=>{

csv+=`${r.data},${r.secao},${r.transportadora},${r.rota},${r.motorista}\n`

})

const blob=new Blob([csv])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="programacao_njg.csv"

a.click()

}

carregar()

render()

</script>

</body>
</html>
