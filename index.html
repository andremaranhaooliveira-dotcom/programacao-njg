<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TMS NJG OPERACIONAL</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
margin-bottom:15px;
}

input{
padding:6px;
margin:3px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{background:#28a745;color:white;}
.del{background:#dc3545;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:13px;
}

th{
background:#2b6cb0;
color:white;
}

</style>
</head>

<body>

<h1>TMS NJG – Controle de Carregamentos</h1>

<h3>Novo Carregamento</h3>

<input id="data" type="date">

<input id="transportadora" placeholder="Transportadora">

<input id="rota" placeholder="Origem / Destino">

<input id="cavalo" placeholder="Cavalo">

<input id="carreta" placeholder="Carreta">

<input id="eixos" placeholder="Eixos">

<input id="sm" placeholder="SM">

<input id="senha" placeholder="Senha">

<input id="motorista" placeholder="Motorista">

<input id="frete" placeholder="Frete Contratado">

<input id="peso" placeholder="Peso Carregado">

<input id="complemento" placeholder="Complemento">

<input id="cobrado" placeholder="Valor Cobrado">

<input id="status" placeholder="Status Checklist">

<input id="telefone" placeholder="Telefone">

<input id="ocorrencias" placeholder="Ocorrências">

<br><br>

<button class="add" onclick="salvar()">Adicionar</button>

<hr>

Buscar:

<input id="busca" onkeyup="render()" placeholder="motorista / placa / transportadora">

<table>

<thead>

<tr>
<th>Data</th>
<th>Transportadora</th>
<th>Rota</th>
<th>Cavalo</th>
<th>Carreta</th>
<th>Motorista</th>
<th>Frete</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

<script>

const KEY="tms_njg_dados"

let dados=[]

function carregar(){

const s=localStorage.getItem(KEY)

if(s){
dados=JSON.parse(s)
}

}

function salvarStorage(){

localStorage.setItem(KEY,JSON.stringify(dados))

}

function salvar(){

const r={

id:Date.now(),

data:data.value,
transportadora:transportadora.value,
rota:rota.value,
cavalo:cavalo.value,
carreta:carreta.value,
eixos:eixos.value,
sm:sm.value,
senha:senha.value,
motorista:motorista.value,
frete:frete.value,
peso:peso.value,
complemento:complemento.value,
cobrado:cobrado.value,
status:status.value,
telefone:telefone.value,
ocorrencias:ocorrencias.value

}

dados.push(r)

salvarStorage()

render()

}

function excluir(id){

if(!confirm("Excluir registro?")) return

dados=dados.filter(x=>x.id!==id)

salvarStorage()

render()

}

function render(){

const tb=document.getElementById("tabela")

tb.innerHTML=""

let lista=[...dados]

const busca=document.getElementById("busca").value.toLowerCase()

if(busca){

lista=lista.filter(r=>

(r.motorista||"").toLowerCase().includes(busca) ||
(r.transportadora||"").toLowerCase().includes(busca) ||
(r.cavalo||"").toLowerCase().includes(busca)

)

}

lista.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.data}</td>
<td>${r.transportadora}</td>
<td>${r.rota}</td>
<td>${r.cavalo}</td>
<td>${r.carreta}</td>
<td>${r.motorista}</td>
<td>${r.frete}</td>
<td>${r.status}</td>

<td>

<button class="del" onclick="excluir(${r.id})">Excluir</button>

</td>

`

tb.appendChild(tr)

})

}

carregar()

render()

</script>

</body>
</html>
