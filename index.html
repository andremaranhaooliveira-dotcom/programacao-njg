<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TMS NJG 4.0</title>

<style>
:root{
  --azul:#1c3d6b;
  --verde:#28a745;
  --vermelho:#dc3545;
  --cinza:#f1f4f8;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--cinza);
}

header{
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  gap:20px;
  padding:15px 25px;
}

header img{
  height:65px;
}

header h1{
  font-size:22px;
}

.container{
  padding:20px 30px;
}

.cards{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  flex:1;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.card h3{
  margin:0;
  font-size:14px;
  color:#666;
}

.card p{
  margin:5px 0 0 0;
  font-size:28px;
  font-weight:bold;
}

.form{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.form h3{
  margin-top:0;
}

.form input{
  padding:6px;
  margin:4px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:7px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btnAdd{background:var(--verde);color:white}
.btnDel{background:var(--vermelho);color:white}
.btnEdit{background:#007bff;color:white}
.btnExport{background:#444;color:white}

.toolbar{
  margin-bottom:10px;
}

.toolbar input{
  padding:6px;
  margin-right:5px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

th{
  background:var(--azul);
  color:white;
  padding:8px;
  font-size:13px;
}

td{
  padding:7px;
  border:1px solid #ddd;
  font-size:13px;
  text-align:center;
}

</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>TMS NJG 4.0 • Gestão Operacional de Transportes</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total de Cargas</h3>
<p id="totalCargas">0</p>
</div>

<div class="card">
<h3>Checklist OK</h3>
<p id="ok">0</p>
</div>

<div class="card">
<h3>Pendentes</h3>
<p id="pend">0</p>
</div>

</div>

<div class="form">

<h3>Novo Carregamento</h3>

<input id="data" type="date">
<input id="transportadora" placeholder="Transportadora">
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="cavalo" placeholder="Cavalo">
<input id="carreta" placeholder="Carreta">
<input id="motorista" placeholder="Motorista">
<input id="frete" placeholder="Frete">
<input id="peso" placeholder="Peso">
<input id="status" placeholder="Status">

<button class="btnAdd" onclick="salvar()">Salvar</button>

</div>

<div class="toolbar">

<input id="busca" placeholder="Buscar motorista / placa / transportadora" onkeyup="render()">

<input id="filtroData" type="date" onchange="render()">

<select id="filtroStatus" onchange="render()">
<option value="">Todos</option>
<option>OK</option>
<option>PENDENTE</option>
</select>

<button class="btnExport" onclick="exportar()">Exportar Excel</button>

</div>

<table>

<thead>

<tr>
<th>Data</th>
<th>Transportadora</th>
<th>Origem</th>
<th>Destino</th>
<th>Cavalo</th>
<th>Carreta</th>
<th>Motorista</th>
<th>Frete</th>
<th>Peso</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const KEY="TMS_NJG_4"

let dados=[]

function carregar(){

const s=localStorage.getItem(KEY)

if(s) dados=JSON.parse(s)

}

function salvarStorage(){

localStorage.setItem(KEY,JSON.stringify(dados))

}

function salvar(){

const r={
id:Date.now(),
data:data.value,
transportadora:transportadora.value,
origem:origem.value,
destino:destino.value,
cavalo:cavalo.value,
carreta:carreta.value,
motorista:motorista.value,
frete:frete.value,
peso:peso.value,
status:status.value
}

dados.push(r)

salvarStorage()

render()

}

function excluir(id){

if(!confirm("Excluir registro?")) return

dados=dados.filter(x=>x.id!==id)

salvarStorage()

render()

}

function render(){

let lista=[...dados]

const busca=document.getElementById("busca").value.toLowerCase()

if(busca){

lista=lista.filter(r=>

(r.motorista||"").toLowerCase().includes(busca) ||
(r.transportadora||"").toLowerCase().includes(busca) ||
(r.cavalo||"").toLowerCase().includes(busca)

)

}

const filtroData=document.getElementById("filtroData").value

if(filtroData){

lista=lista.filter(r=>r.data===filtroData)

}

const filtroStatus=document.getElementById("filtroStatus").value

if(filtroStatus){

lista=lista.filter(r=>r.status===filtroStatus)

}

const tb=document.getElementById("tabela")

tb.innerHTML=""

let ok=0

lista.forEach(r=>{

if(r.status=="OK") ok++

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.data}</td>
<td>${r.transportadora}</td>
<td>${r.origem}</td>
<td>${r.destino}</td>
<td>${r.cavalo}</td>
<td>${r.carreta}</td>
<td>${r.motorista}</td>
<td>${r.frete}</td>
<td>${r.peso}</td>
<td>${r.status}</td>

<td>
<button class="btnDel" onclick="excluir(${r.id})">Excluir</button>
</td>
`

tb.appendChild(tr)

})

document.getElementById("totalCargas").innerText=dados.length
document.getElementById("ok").innerText=ok
document.getElementById("pend").innerText=dados.length-ok

}

function exportar(){

let csv="Data,Transportadora,Origem,Destino,Cavalo,Carreta,Motorista,Frete,Peso,Status\n"

dados.forEach(r=>{

csv+=`${r.data},${r.transportadora},${r.origem},${r.destino},${r.cavalo},${r.carreta},${r.motorista},${r.frete},${r.peso},${r.status}\n`

})

const blob=new Blob([csv],{type:"text/csv"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="carregamentos_njg.csv"

a.click()

}

carregar()

render()

</script>

</body>
</html>
