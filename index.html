```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS NJG 10.0</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

.topbar{
background:#2f4466;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
}

.logo{

align-items:center;

}

.logo img{

}

button{
border:none;
padding:8px 14px;

cursor:pointer;

}

.btnNovo{background:#2ecc71;}
.btnEdit{background:#3498db;}
.btnDel{background:#e74c3c;}

.cards{

.card{

box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.formArea{

margin:20px;

box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:7px;
border-radius:6px;
border:1px solid #ccc;
margin:4px;
}

.tableArea{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#f4f6f9;

}

padding:8px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<header class="topbar">

<div class="logo">
<img src="logo.png">
<span>TMS NJG 10.0</span>
</div>

<button class="btnNovo" onclick="limparForm()">Novo</button>

</header>

<section class="cards">

<div class="card">
<h2 id="total">0</h2>
<p>Total Registros</p>
</div>

<div class="card">
<h2 id="finalizados">0</h2>
<p>Finalizados</p>
</div>

</section>

<section class="formArea">

<input id="data" placeholder="Data">

<input id="transportadora" placeholder="Transportadora">

<input id="rota" placeholder="Rota">

<input id="motorista" placeholder="Motorista">

<select id="status">
<option>ON</option>
<option>OFF</option>
<option>FROG</option>
<option>FINALIZADO</option>
</select>

<button class="btnNovo" onclick="salvar()">Salvar</button>

</section>

<section class="tableArea">

<input id="busca" placeholder="Buscar..." onkeyup="filtrar()">

<table>

<thead>

<tr>
<th>DATA</th>
<th>TRANSPORTADORA</th>
<th>ROTA</th>
<th>MOTORISTA</th>
<th>STATUS</th>
<th>AÇÕES</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAd4yEQwsQ2ps8oRv4Ng97F1xu1Sc-mnC8",
authDomain: "njg-controle-de-carregamento.firebaseapp.com",
projectId: "njg-controle-de-carregamento",
storageBucket: "njg-controle-de-carregamento.firebasestorage.app",
messagingSenderId: "753611983634",
appId: "1:753611983634:web:71b5793a63599a2b7e01cb",
measurementId: "G-JWDW47YE74"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let editId=null;

const tabela=document.getElementById("tabela");

async function carregar(){

const snapshot=await getDocs(collection(db,"cargas"));

tabela.innerHTML="";

let total=0;
let finalizados=0;

snapshot.forEach((docu)=>{

const r=docu.data();

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${r.data||""}</td>
<td>${r.transportadora||""}</td>
<td>${r.rota||""}</td>
<td>${r.motorista||""}</td>
<td>${r.status||""}</td>

<td>

<button class="btnEdit" onclick="editar('${docu.id}','${r.data}','${r.transportadora}','${r.rota}','${r.motorista}','${r.status}')">Editar</button>

<button class="btnDel" onclick="excluir('${docu.id}')">Excluir</button>

</td>

`;

tabela.appendChild(tr);

total++;

if(r.status==="FINALIZADO") finalizados++;

});

document.getElementById("total").innerText=total;

document.getElementById("finalizados").innerText=finalizados;

}

window.salvar=async function(){

const data=document.getElementById("data").value;
const transportadora=document.getElementById("transportadora").value;
const rota=document.getElementById("rota").value;
const motorista=document.getElementById("motorista").value;
const status=document.getElementById("status").value;

if(editId){

await updateDoc(doc(db,"cargas",editId),{
data,
transportadora,
rota,
motorista,
status
});

editId=null;

}else{

await addDoc(collection(db,"cargas"),{
data,
transportadora,
rota,
motorista,
status
});

}

limparForm();

carregar();

}

window.editar=function(id,data,t,r,m,s){

editId=id;

document.getElementById("data").value=data;
document.getElementById("transportadora").value=t;
document.getElementById("rota").value=r;
document.getElementById("motorista").value=m;
document.getElementById("status").value=s;

}

window.excluir=async function(id){

if(!confirm("Excluir registro?")) return;

await deleteDoc(doc(db,"cargas",id));

carregar();

}

window.limparForm=function(){

editId=null;

document.getElementById("data").value="";
document.getElementById("transportadora").value="";
document.getElementById("rota").value="";
document.getElementById("motorista").value="";
document.getElementById("status").value="ON";

}

window.filtrar=function(){

const termo=document.getElementById("busca").value.toLowerCase();

const linhas=document.querySelectorAll("#tabela tr");

linhas.forEach(l=>{

l.style.display=l.innerText.toLowerCase().includes(termo)?"":"none";

});

}

carregar();

</script>

</body>
</html>
